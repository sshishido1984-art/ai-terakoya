  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1cbf14f3-bf4f-4c15-9424-ea247124f531\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<link href=\"https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap\" rel=\"stylesheet\">\n<style>\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\nbody{margin:0;background:#F3EEE3;}\n::selection{background:rgba(46,74,78,.16);}\na{color:inherit;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:'Noto Sans JP',sans-serif;color:#23211C;background:#F3EEE3;overflow:hidden;\">\n\n<!-- ============ NAV ============ -->\n<nav style=\"position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:15px 32px;background:rgba(243,238,227,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid #DAD1BF;\">\n  <a href=\"#top\" style=\"display:flex;align-items:center;gap:12px;text-decoration:none;\">\n    <span style=\"width:24px;height:24px;border:1.5px solid #2E4A4E;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:13px;color:#2E4A4E;\">智<\u002Fspan>\n    <span style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:18px;color:#23211C;letter-spacing:.05em;white-space:nowrap;\">生成AI寺子屋<\u002Fspan>\n  <\u002Fa>\n  <div style=\"display:flex;align-items:center;gap:4px;white-space:nowrap;\">\n    <a href=\"#basics\" style=\"text-decoration:none;color:#57534A;font-size:14px;font-weight:500;padding:8px 13px;\">生成AIとは<\u002Fa>\n    <a href=\"#howto\" style=\"text-decoration:none;color:#57534A;font-size:14px;font-weight:500;padding:8px 13px;\">使い方<\u002Fa>\n    <a href=\"#prompts\" style=\"text-decoration:none;color:#57534A;font-size:14px;font-weight:500;padding:8px 13px;\">プロンプト集<\u002Fa>\n    <a href=\"#safety\" style=\"text-decoration:none;color:#A6492E;font-size:14px;font-weight:700;padding:8px 13px;border-bottom:2px solid #A6492E;\">安全に使う<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ============ HERO ============ -->\n<section id=\"top\" style=\"position:relative;padding:148px 32px 88px;border-bottom:1px solid #DAD1BF;\">\n  <div style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1.45fr 1fr;gap:64px;align-items:start;\">\n    <!-- left -->\n    <div style=\"min-width:0;\">\n      <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:15px;color:#837C6E;letter-spacing:.04em;margin-bottom:26px;\">A study house of generative AI&nbsp;—&nbsp;for clinical laboratory technologists<\u002Fdiv>\n      <h1 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(40px,6.4vw,82px);line-height:1.16;margin:0;color:#23211C;letter-spacing:.01em;\">生成AIを、<br>現場の<span style=\"color:#2E4A4E;border-bottom:3px solid #2E4A4E;padding-bottom:2px;\">道具<\u002Fspan>に。<\u002Fh1>\n      <p style=\"font-size:16.5px;color:#57534A;line-height:2.05;margin:34px 0 0;max-width:540px;font-weight:400;\">臨床検査技師のための、生成AI活用の学び舎。シーン別のプロンプトをコピーして、<b style=\"color:#2E4A4E;font-weight:700;\">【&nbsp;】<\u002Fb>を自分の言葉に置き換えるだけ。基本の知識から、明日の業務まで。迷ったら、ここへ。<\u002Fp>\n      <div style=\"display:flex;gap:14px;flex-wrap:wrap;margin-top:38px;\">\n        <a href=\"#prompts\" style=\"text-decoration:none;background:#2E4A4E;color:#F3EEE3;font-family:'Shippori Mincho B1',serif;font-weight:600;font-size:15.5px;padding:14px 28px;border-radius:4px;\">プロンプト集へ<\u002Fa>\n        <a href=\"#basics\" style=\"text-decoration:none;background:transparent;color:#2E4A4E;font-weight:600;font-size:15px;padding:14px 24px;border-radius:4px;border:1px solid #C3BAA6;\">生成AIとは？<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- right : 目次 -->\n    <aside style=\"border:1px solid #DAD1BF;border-radius:5px;background:#FBF8F1;padding:30px 30px 22px;\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid #E4DCCB;padding-bottom:14px;margin-bottom:6px;\">\n        <span style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:17px;color:#23211C;\">目次<\u002Fspan>\n        <span style=\"font-family:'Spectral',serif;font-style:italic;font-size:13px;color:#A39A89;\">contents<\u002Fspan>\n      <\u002Fdiv>\n      <sc-for list=\"{{ toc }}\" as=\"t\" hint-placeholder-count=\"9\">\n        <a href=\"{{ t.href }}\" style=\"display:flex;align-items:baseline;gap:14px;text-decoration:none;padding:10px 0;border-bottom:1px solid #EDE6D7;\">\n          <span style=\"font-family:'Spectral',serif;font-size:14px;color:#9A9788;flex:none;width:22px;\">{{ t.num }}<\u002Fspan>\n          <span style=\"font-size:14.5px;color:#3A372F;font-weight:500;\">{{ t.label }}<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 生成AIとは ============ -->\n<sc-if value=\"{{ showBasics }}\" hint-placeholder-val=\"{{ true }}\">\n<section id=\"basics\" style=\"background:#F3EEE3;padding:96px 32px 92px;scroll-margin-top:66px;border-bottom:1px solid #DAD1BF;\">\n  <div style=\"max-width:1180px;margin:0 auto;\">\n    <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:16px;color:#2E4A4E;margin-bottom:12px;\">I&nbsp;—&nbsp;basics<\u002Fdiv>\n    <h2 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(28px,4.2vw,46px);line-height:1.22;margin:0;color:#23211C;\">そもそも、生成AIとは。<\u002Fh2>\n    <p style=\"color: #57534A; font-size: 20px; line-height: 2; margin: 18px 0 0; width: 1029px; height: 53px\">難しい仕組みは知らなくても大丈夫。「何が得意で、何に気をつけるか」が分かれば、もう使い始められます。<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:1px;background:#DAD1BF;border:1px solid #DAD1BF;border-radius:5px;overflow:hidden;margin-top:46px;\">\n      <div style=\"background:#FBF8F1;padding:30px;\">\n        <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:14px;color:#2E4A4E;margin-bottom:12px;\">what<\u002Fdiv>\n        <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:20px;color:#23211C;margin:0 0 12px;\">生成AIって何？<\u002Fh3>\n        <p style=\"color:#57534A;font-size:14.5px;line-height:1.95;margin:0;\">大量の文章を学習し、人間のように文章を作るAI。ChatGPT・Claude・Geminiなどが代表的。文章で指示すると、文章で返してくれます。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FBF8F1;padding:30px;\">\n        <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:14px;color:#2E4A4E;margin-bottom:12px;\">good at<\u002Fdiv>\n        <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:20px;color:#23211C;margin:0 0 12px;\">得意なこと<\u002Fh3>\n        <p style=\"color:#57534A;font-size:14.5px;line-height:1.95;margin:0;\">文章の作成・要約・翻訳・言い換え、アイデア出し、たたき台づくり、表や箇条書きへの整形。「0→1」より「1→10」が得意です。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FBF8F1;padding:30px;\">\n        <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:14px;color:#A6492E;margin-bottom:12px;\">careful<\u002Fdiv>\n        <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:20px;color:#23211C;margin:0 0 12px;\">苦手なこと<\u002Fh3>\n        <p style=\"color:#57534A;font-size:14.5px;line-height:1.95;margin:0;\">最新情報や正確な数値、事実の保証。もっともらしい誤り（ハルシネーション）が起きます。<b style=\"color:#A6492E;\">出力は必ず人が確認<\u002Fb>を。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FBF8F1;padding:30px;\">\n        <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:14px;color:#2E4A4E;margin-bottom:12px;\">prompt<\u002Fdiv>\n        <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:20px;color:#23211C;margin:0 0 12px;\">プロンプトとは<\u002Fh3>\n        <p style=\"color:#57534A;font-size:14.5px;line-height:1.95;margin:0;\">AIへの指示文のこと。「役割・文脈・指示・制約・形式」を具体的に書くほど、欲しい答えに近づきます。この寺子屋の主役です。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FBF8F1;padding:30px;\">\n        <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:14px;color:#2E4A4E;margin-bottom:12px;\">how<\u002Fdiv>\n        <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:20px;color:#23211C;margin:0 0 12px;\">ここでの学び方<\u002Fh3>\n        <p style=\"color:#57534A;font-size:14.5px;line-height:1.95;margin:0;\">シーンに合うプロンプトを選んでコピー。<b style=\"color:#2E4A4E;\">【&nbsp;】<\u002Fb>の変数を自分の状況に置き換えて、AIに貼り付けるだけ。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FBF8F1;padding:30px;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:30px;color:#2E4A4E;line-height:1;\">三つの道具<\u002Fdiv>\n        <p style=\"color:#57534A;font-size:14px;line-height:1.9;margin:12px 0 0;\">代表的なツール：<b style=\"color:#23211C;\">ChatGPT<\u002Fb>／<b style=\"color:#23211C;\">Claude<\u002Fb>／<b style=\"color:#23211C;\">Gemini<\u002Fb>。プロンプトはどれでもほぼ共通で使えます。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 仕組みをやさしく -->\n    <div style=\"margin-top:64px;\">\n      <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(22px,3vw,30px);color:#23211C;margin:0 0 6px;\">仕組みを、ひとことで。<\u002Fh3>\n      <p style=\"color:#57534A;font-size:15px;line-height:1.95;margin:0 0 28px;max-width:640px;\">生成AIは「次に来そうな言葉」を、ものすごい量の文章から学んで予測しているだけ。意味を理解しているわけでも、調べているわけでもありません。だからこそ得意・苦手がはっきりします。<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px;\">\n        <div style=\"border-left:2px solid #2E4A4E;padding:4px 0 4px 20px;\">\n          <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:14px;color:#A6492E;margin-bottom:8px;\">step 01<\u002Fdiv>\n          <h4 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:18px;color:#23211C;margin:0 0 8px;\">学ぶ<\u002Fh4>\n          <p style=\"color:#57534A;font-size:14px;line-height:1.9;margin:0;\">本・記事・ウェブなど膨大な文章から、言葉の並び方のパターンを学習します。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-left:2px solid #2E4A4E;padding:4px 0 4px 20px;\">\n          <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:14px;color:#A6492E;margin-bottom:8px;\">step 02<\u002Fdiv>\n          <h4 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:18px;color:#23211C;margin:0 0 8px;\">予測する<\u002Fh4>\n          <p style=\"color:#57534A;font-size:14px;line-height:1.9;margin:0;\">あなたの文章に続いて「最もありそうな言葉」を、一語ずつ確率で選んでいきます。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-left:2px solid #2E4A4E;padding:4px 0 4px 20px;\">\n          <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:14px;color:#A6492E;margin-bottom:8px;\">step 03<\u002Fdiv>\n          <h4 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:18px;color:#23211C;margin:0 0 8px;\">文章になる<\u002Fh4>\n          <p style=\"color:#57534A;font-size:14px;line-height:1.9;margin:0;\">その積み重ねが、自然な文章として返ってきます。事実かどうかは保証されません。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:22px;background:#EFEEDF;border:1px solid #DDD7C2;border-radius:5px;padding:18px 22px;display:flex;gap:12px;align-items:flex-start;\">\n        <span style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:13px;color:#5A6B52;flex:none;\">要点<\u002Fspan>\n        <p style=\"color:#4F5A48;font-size:14px;line-height:1.85;margin:0;\">「もっともらしいが、間違っていることがある」のはこのため。<b style=\"color:#23211C;\">ハルシネーション（もっともらしい誤り）<\u002Fb>と呼ばれ、検査値・基準値・文献情報などは特に注意。最終確認は必ず人が行います。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 良い例・惜しい例 -->\n    <div style=\"margin-top:60px;\">\n      <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(22px,3vw,30px);color:#23211C;margin:0 0 6px;\">同じ用件でも、頼み方で変わる。<\u002Fh3>\n      <p style=\"color:#57534A;font-size:15px;line-height:1.95;margin:0 0 28px;max-width:640px;\">プロンプト次第で答えの質は大きく変わります。検査現場の例で、惜しい頼み方と良い頼み方を比べてみましょう。<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1px;background:#DAD1BF;border:1px solid #DAD1BF;border-radius:5px;overflow:hidden;\">\n        <div style=\"background:#F6E9E1;padding:26px 28px;\">\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:14px;\"><span style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;color:#A6492E;font-size:15px;\">惜しい例<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#FBF3EE;border:1px solid #E3C3B4;border-radius:4px;padding:14px 16px;font-size:14px;line-height:1.85;color:#6B453A;\">CRPについて教えて。<\u002Fdiv>\n          <p style=\"color:#8a5848;font-size:13px;line-height:1.8;margin:14px 0 0;\">→ 一般的で当たり障りのない説明が返るだけ。誰に向けて、何のために、どんな形で欲しいのかが伝わっていません。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#EAF0EA;padding:26px 28px;\">\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:14px;\"><span style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;color:#3F6B4E;font-size:15px;\">良い例<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#F6FAF6;border:1px solid #CFE0D2;border-radius:4px;padding:14px 16px;font-size:13.5px;line-height:1.85;color:#33473A;\">あなたは経験豊富な臨床検査技師です。新人技師に向けて、CRPが上がる仕組みを200字程度で、身近なたとえを1つ入れてやさしく説明してください。最後に1行サマリーを付けて。<\u002Fdiv>\n          <p style=\"color:#3F6B4E;font-size:13px;line-height:1.8;margin:14px 0 0;\">→ <b>役割・読者・字数・たとえ・形式<\u002Fb>を指定。狙いどおりの、使える説明が返ります。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 上手に使う5つのコツ -->\n    <div style=\"margin-top:60px;\">\n      <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(22px,3vw,30px);color:#23211C;margin:0 0 26px;\">もっと上手に使う、五つのコツ。<\u002Fh3>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:1px;background:#DAD1BF;border:1px solid #DAD1BF;border-radius:5px;overflow:hidden;\">\n        <div style=\"background:#FBF8F1;padding:26px 28px;\">\n          <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:13px;color:#A6492E;margin-bottom:8px;\">tip 01<\u002Fdiv>\n          <h4 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:17px;color:#23211C;margin:0 0 8px;\">具体的に頼む<\u002Fh4>\n          <p style=\"color:#57534A;font-size:14px;line-height:1.9;margin:0;\">「分かりやすく」より「中学生に向けて200字で」。条件が細かいほど精度は上がります。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:26px 28px;\">\n          <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:13px;color:#A6492E;margin-bottom:8px;\">tip 02<\u002Fdiv>\n          <h4 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:17px;color:#23211C;margin:0 0 8px;\">お手本を見せる<\u002Fh4>\n          <p style=\"color:#57534A;font-size:14px;line-height:1.9;margin:0;\">理想の書きぶりの例を1つ渡すと、トーンや形式をまねてくれます。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:26px 28px;\">\n          <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:13px;color:#A6492E;margin-bottom:8px;\">tip 03<\u002Fdiv>\n          <h4 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:17px;color:#23211C;margin:0 0 8px;\">対話で仕上げる<\u002Fh4>\n          <p style=\"color:#57534A;font-size:14px;line-height:1.9;margin:0;\">一発で完璧を狙わない。「もっと簡潔に」「表にして」と追加注文で磨きます。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:26px 28px;\">\n          <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:13px;color:#A6492E;margin-bottom:8px;\">tip 04<\u002Fdiv>\n          <h4 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:17px;color:#23211C;margin:0 0 8px;\">出力の形を指定<\u002Fh4>\n          <p style=\"color:#57534A;font-size:14px;line-height:1.9;margin:0;\">「表で」「箇条書きで」「3案」「ですます調で」。欲しい形を言葉にしておきます。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:26px 28px;\">\n          <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:13px;color:#A6492E;margin-bottom:8px;\">tip 05<\u002Fdiv>\n          <h4 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:17px;color:#23211C;margin:0 0 8px;\">必ず検証する<\u002Fh4>\n          <p style=\"color:#57534A;font-size:14px;line-height:1.9;margin:0;\">数値・文献・規程は鵜呑みにせず裏取りを。AIはたたき台、判断はあなた。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:26px 28px;display:flex;flex-direction:column;justify-content:center;\">\n          <p style=\"color:#57534A;font-size:14px;line-height:1.95;margin:0;\">迷ったら、下の<a href=\"#prompts\" style=\"color:#2E4A4E;font-weight:700;text-decoration:none;border-bottom:1px solid #2E4A4E;\">プロンプト集<\u002Fa>から選んでコピーするのが近道です。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- プロンプトの型 -->\n    <div style=\"margin-top:60px;border:1px solid #DAD1BF;border-radius:5px;background:#FBF8F1;padding:36px 34px;\">\n      <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:21px;color:#23211C;margin:0 0 4px;\">伝わるプロンプトの「型」<\u002Fh3>\n      <p style=\"color:#837C6E;font-size:14px;margin:0 0 26px;\">この五つを意識すると、ぐっと精度が上がります。<\u002Fp>\n      <div style=\"display:flex;gap:0;flex-wrap:wrap;\">\n        <div style=\"flex:1 1 180px;padding:0 22px;border-left:1px solid #E4DCCB;\">\n          <div style=\"font-family:'Spectral',serif;font-size:13px;color:#A6492E;font-style:italic;\">01<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;color:#23211C;font-size:18px;margin:6px 0 8px;\">役割<\u002Fdiv>\n          <div style=\"color:#57534A;font-size:13px;line-height:1.75;\">「あなたは臨床検査技師です」<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 180px;padding:0 22px;border-left:1px solid #E4DCCB;\">\n          <div style=\"font-family:'Spectral',serif;font-size:13px;color:#A6492E;font-style:italic;\">02<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;color:#23211C;font-size:18px;margin:6px 0 8px;\">文脈<\u002Fdiv>\n          <div style=\"color:#57534A;font-size:13px;line-height:1.75;\">背景・前提・対象読者を伝える<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 180px;padding:0 22px;border-left:1px solid #E4DCCB;\">\n          <div style=\"font-family:'Spectral',serif;font-size:13px;color:#A6492E;font-style:italic;\">03<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;color:#23211C;font-size:18px;margin:6px 0 8px;\">指示<\u002Fdiv>\n          <div style=\"color:#57534A;font-size:13px;line-height:1.75;\">してほしいことを明確に<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 180px;padding:0 22px;border-left:1px solid #E4DCCB;\">\n          <div style=\"font-family:'Spectral',serif;font-size:13px;color:#A6492E;font-style:italic;\">04<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;color:#23211C;font-size:18px;margin:6px 0 8px;\">制約<\u002Fdiv>\n          <div style=\"color:#57534A;font-size:13px;line-height:1.75;\">字数・トーン・条件を指定<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 180px;padding:0 22px;border-left:1px solid #E4DCCB;\">\n          <div style=\"font-family:'Spectral',serif;font-size:13px;color:#A6492E;font-style:italic;\">05<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;color:#23211C;font-size:18px;margin:6px 0 8px;\">出力形式<\u002Fdiv>\n          <div style=\"color:#57534A;font-size:13px;line-height:1.75;\">箇条書き・表・3案など<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 用語ミニ辞典 -->\n    <div style=\"margin-top:60px;\">\n      <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(22px,3vw,30px);color:#23211C;margin:0 0 26px;\">知っておきたい、用語ミニ辞典。<\u002Fh3>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:#DAD1BF;border:1px solid #DAD1BF;border-radius:5px;overflow:hidden;\">\n        <div style=\"background:#FBF8F1;padding:22px 26px;\">\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#2E4A4E;margin-bottom:7px;\">大規模言語モデル（LLM）<\u002Fdiv>\n          <p style=\"color:#57534A;font-size:13.5px;line-height:1.85;margin:0;\">膨大な文章で訓練された、言葉を扱うAIの中身。ChatGPTなどの正体です。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:22px 26px;\">\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#2E4A4E;margin-bottom:7px;\">プロンプト<\u002Fdiv>\n          <p style=\"color:#57534A;font-size:13.5px;line-height:1.85;margin:0;\">AIへの指示文。質の良し悪しが、答えの質をほぼ決めます。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:22px 26px;\">\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#A6492E;margin-bottom:7px;\">ハルシネーション<\u002Fdiv>\n          <p style=\"color:#57534A;font-size:13.5px;line-height:1.85;margin:0;\">もっともらしいが事実でない出力。数値・文献・規程は必ず裏取りを。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:22px 26px;\">\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#2E4A4E;margin-bottom:7px;\">トークン<\u002Fdiv>\n          <p style=\"color:#57534A;font-size:13.5px;line-height:1.85;margin:0;\">AIが文章を扱う単位。長文ほど多くのトークンを使い、上限があります。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:22px 26px;\">\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#2E4A4E;margin-bottom:7px;\">マルチモーダル<\u002Fdiv>\n          <p style=\"color:#57534A;font-size:13.5px;line-height:1.85;margin:0;\">文章だけでなく画像なども扱える機能。※医療画像・患者写真の入力は不可。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF8F1;padding:22px 26px;\">\n          <div style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#2E4A4E;margin-bottom:7px;\">コンテキスト<\u002Fdiv>\n          <p style=\"color:#57534A;font-size:13.5px;line-height:1.85;margin:0;\">同じ会話内でAIが覚えている文脈。前提を渡すほど噛み合った答えに。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FAQ -->\n    <div style=\"margin-top:60px;\">\n      <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(22px,3vw,30px);color:#23211C;margin:0 0 26px;\">はじめての、よくある疑問。<\u002Fh3>\n      <div style=\"border:1px solid #DAD1BF;border-radius:5px;background:#FBF8F1;overflow:hidden;\">\n        <details style=\"border-bottom:1px solid #E6DECB;\">\n          <summary style=\"cursor:pointer;padding:20px 26px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#23211C;list-style:none;\">Q. お金はかかりますか？<\u002Fsummary>\n          <div style=\"padding:0 26px 20px;color:#57534A;font-size:14px;line-height:1.9;\">ChatGPT・Claude・Geminiには無料で使える範囲があります。より高性能なモデルや機能は有料です。まずは無料の範囲で十分に試せます。<\u002Fdiv>\n        <\u002Fdetails>\n        <details style=\"border-bottom:1px solid #E6DECB;\">\n          <summary style=\"cursor:pointer;padding:20px 26px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#23211C;list-style:none;\">Q. どのツールを使えばいい？<\u002Fsummary>\n          <div style=\"padding:0 26px 20px;color:#57534A;font-size:14px;line-height:1.9;\">どれでも構いません。文章作成はどれも得意です。まずは一つ触ってみて、使い心地で選んでください。本サイトのプロンプトはどのツールでもほぼ共通で使えます。<\u002Fdiv>\n        <\u002Fdetails>\n        <details style=\"border-bottom:1px solid #E6DECB;\">\n          <summary style=\"cursor:pointer;padding:20px 26px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#23211C;list-style:none;\">Q. 日本語でも大丈夫？<\u002Fsummary>\n          <div style=\"padding:0 26px 20px;color:#57534A;font-size:14px;line-height:1.9;\">問題ありません。日本語で指示し、日本語で受け取れます。英語抄録のように、英語で出力させることもできます。<\u002Fdiv>\n        <\u002Fdetails>\n        <details style=\"border-bottom:1px solid #E6DECB;\">\n          <summary style=\"cursor:pointer;padding:20px 26px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#A6492E;list-style:none;\">Q. 入力した内容は外に漏れませんか？<\u002Fsummary>\n          <div style=\"padding:0 26px 20px;color:#57534A;font-size:14px;line-height:1.9;\">無料版では入力がAIの学習に使われる場合があります。<b style=\"color:#A6492E;\">患者・個人情報は決して入力しない<\u002Fb>こと、各ツールの設定・利用規約と院内規程を確認することが大原則です。<\u002Fdiv>\n        <\u002Fdetails>\n        <details>\n          <summary style=\"cursor:pointer;padding:20px 26px;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;color:#23211C;list-style:none;\">Q. AIが間違えたらどうする？<\u002Fsummary>\n          <div style=\"padding:0 26px 20px;color:#57534A;font-size:14px;line-height:1.9;\">間違いは起こる前提で使います。AIの出力はあくまで「たたき台」。専門家であるあなたが検証し、最終判断を下してください。<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fsc-if>\n\n<!-- ============ 使い方 ============ -->\n<section id=\"howto\" style=\"background:#EBE4D6;padding:90px 32px;scroll-margin-top:66px;border-bottom:1px solid #DAD1BF;\">\n  <div style=\"max-width:1180px;margin:0 auto;\">\n    <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:16px;color:#2E4A4E;margin-bottom:12px;\">II&nbsp;—&nbsp;how to use<\u002Fdiv>\n    <h2 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(28px,4.2vw,46px);line-height:1.22;margin:0;color:#23211C;\">使い方は、四つの所作。<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:34px;margin-top:46px;\">\n      <div>\n        <div style=\"font-family:'Spectral',serif;font-size:40px;color:#2E4A4E;line-height:1;\">01<\u002Fdiv>\n        <div style=\"width:34px;height:1px;background:#C3BAA6;margin:16px 0;\"><\u002Fdiv>\n        <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:19px;color:#23211C;margin:0 0 10px;\">選ぶ<\u002Fh3>\n        <p style=\"color:#57534A;font-size:14px;line-height:1.95;margin:0;\">下のシーン一覧から、今のあなたに合うプロンプトを探します。<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Spectral',serif;font-size:40px;color:#2E4A4E;line-height:1;\">02<\u002Fdiv>\n        <div style=\"width:34px;height:1px;background:#C3BAA6;margin:16px 0;\"><\u002Fdiv>\n        <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:19px;color:#23211C;margin:0 0 10px;\">置き換える<\u002Fh3>\n        <p style=\"color:#57534A;font-size:14px;line-height:1.95;margin:0;\"><b style=\"color:#2E4A4E;\">【変数】<\u002Fb>を自分の状況に。入力欄に書けば、自動でプロンプトに反映されます。<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Spectral',serif;font-size:40px;color:#2E4A4E;line-height:1;\">03<\u002Fdiv>\n        <div style=\"width:34px;height:1px;background:#C3BAA6;margin:16px 0;\"><\u002Fdiv>\n        <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:19px;color:#23211C;margin:0 0 10px;\">写しとる<\u002Fh3>\n        <p style=\"color:#57534A;font-size:14px;line-height:1.95;margin:0;\">「入力を反映してコピー」か「そのままコピー」。AIに貼り付けます。<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Spectral',serif;font-size:40px;color:#2E4A4E;line-height:1;\">04<\u002Fdiv>\n        <div style=\"width:34px;height:1px;background:#C3BAA6;margin:16px 0;\"><\u002Fdiv>\n        <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:19px;color:#23211C;margin:0 0 10px;\">対話する<\u002Fh3>\n        <p style=\"color:#57534A;font-size:14px;line-height:1.95;margin:0;\">返答に追加で注文。「もっと簡潔に」「表にして」など、会話で仕上げます。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 安全に使う ============ -->\n<section id=\"safety\" style=\"background:#F3EEE3;padding:84px 32px;scroll-margin-top:66px;border-bottom:1px solid #DAD1BF;\">\n  <div style=\"max-width:1180px;margin:0 auto;\">\n    <div style=\"border:1px solid #DEBBA9;border-left:4px solid #A6492E;border-radius:5px;background:#F6E9E1;padding:38px 38px 30px;\">\n      <div style=\"display:inline-block;font-family:'Spectral',serif;font-style:italic;font-size:15px;color:#A6492E;margin-bottom:10px;\">important notice&nbsp;—&nbsp;使う前に必ず<\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(26px,3.8vw,42px);line-height:1.24;margin:0;color:#7E2F1C;\">患者情報は、AIに入れない。<\u002Fh2>\n      <p style=\"color:#6B453A;font-size:15.5px;line-height:1.95;margin:14px 0 0;max-width:640px;\">便利さの前に、まず安全。医療現場で生成AIを使うときの大原則です。各プロンプトでも繰り返しお伝えします。<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1px;background:#E3C3B4;border:1px solid #E3C3B4;border-radius:5px;overflow:hidden;margin-top:30px;\">\n        <div style=\"background:#FBF3EE;padding:22px 24px;\">\n          <div style=\"color:#A6492E;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;margin-bottom:8px;\">一. 個人情報は入力しない<\u002Fdiv>\n          <p style=\"color:#6B453A;font-size:13.5px;line-height:1.85;margin:0;\">氏名・患者ID・生年月日・住所・画像など、個人を特定できる情報は決して入れない。匿名化・一般化して使う。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF3EE;padding:22px 24px;\">\n          <div style=\"color:#A6492E;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;margin-bottom:8px;\">二. 院内規程を確認する<\u002Fdiv>\n          <p style=\"color:#6B453A;font-size:13.5px;line-height:1.85;margin:0;\">施設のガイドライン・情報セキュリティ規程を必ず確認。許可されたツール・範囲で使う。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF3EE;padding:22px 24px;\">\n          <div style=\"color:#A6492E;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;margin-bottom:8px;\">三. 出力を鵜呑みにしない<\u002Fdiv>\n          <p style=\"color:#6B453A;font-size:13.5px;line-height:1.85;margin:0;\">AIは誤ることがある。最終判断は必ず専門家として自分で検証する。たたき台として活用する。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF3EE;padding:22px 24px;\">\n          <div style=\"color:#A6492E;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:16px;margin-bottom:8px;\">四. 学習利用の設定を確認<\u002Fdiv>\n          <p style=\"color:#6B453A;font-size:13.5px;line-height:1.85;margin:0;\">無料版では入力が学習に使われる場合がある。各ツールの設定・利用規約を確認してから使う。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ プロンプト集 ============ -->\n<section id=\"prompts\" style=\"background:#EBE4D6;padding:92px 32px 64px;scroll-margin-top:66px;\">\n  <div style=\"max-width:1200px;margin:0 auto;\">\n    <div style=\"font-family:'Spectral',serif;font-style:italic;font-size:16px;color:#2E4A4E;margin-bottom:12px;\">III&nbsp;—&nbsp;prompt library<\u002Fdiv>\n    <h2 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(30px,4.6vw,52px);line-height:1.18;margin:0;color:#23211C;\">シーン別・プロンプト集<\u002Fh2>\n    <p style=\"color:#57534A;font-size:16px;line-height:2;margin:18px 0 0;max-width:640px;\">臨床検査技師の業務シーンを九つに分類。気になるところへジャンプして、コピーして使ってください。<\u002Fp>\n\n    <!-- quick nav -->\n    <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:30px;\">\n      <sc-for list=\"{{ toc }}\" as=\"t\" hint-placeholder-count=\"9\">\n        <a href=\"{{ t.href }}\" style=\"text-decoration:none;background:#FBF8F1;border:1px solid #D3CAB7;color:#2E4A4E;font-size:13.5px;font-weight:600;padding:9px 15px;border-radius:30px;\">{{ t.label }}<\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div>\n      <sc-for list=\"{{ categories }}\" as=\"cat\" hint-placeholder-count=\"9\">\n        <div id=\"{{ cat.anchor }}\" style=\"scroll-margin-top:74px;padding-top:58px;\">\n          <div style=\"display:flex;align-items:baseline;gap:18px;border-bottom:1px solid #C3BAA6;padding-bottom:18px;margin-bottom:30px;\">\n            <span style=\"font-family:'Spectral',serif;font-size:30px;color:#2E4A4E;flex:none;\">{{ cat.num }}<\u002Fspan>\n            <div style=\"min-width:0;\">\n              <h3 style=\"font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:clamp(22px,3vw,32px);color:#23211C;margin:0;\">{{ cat.label }}<\u002Fh3>\n              <p style=\"color:#7C7264;font-size:14px;margin:6px 0 0;\">{{ cat.tagline }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(345px,1fr));gap:22px;\">\n            <sc-for list=\"{{ cat.prompts }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"background:#FBF8F1;border:1px solid #DAD1BF;border-radius:5px;padding:24px;display:flex;flex-direction:column;\">\n                <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;\">\n                  <h4 style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:18.5px;color:#23211C;margin:0;line-height:1.45;\">{{ p.title }}<\u002Fh4>\n                  <sc-if value=\"{{ p.riskHigh }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"flex:none;background:#F3E0D7;color:#A6492E;border:1px solid #DEBBA9;font-size:11px;font-weight:700;padding:4px 9px;border-radius:3px;white-space:nowrap;\">患者情報NG<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <p style=\"color:#6B6356;font-size:13.5px;line-height:1.8;margin:9px 0 16px;\">{{ p.desc }}<\u002Fp>\n\n                <!-- prompt manuscript panel -->\n                <div style=\"background:#F7F2E7;border:1px solid #E0D8C6;border-radius:4px;overflow:hidden;\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid #E6DECB;background:#F1EADA;\">\n                    <span style=\"font-family:'Spectral',serif;font-style:italic;font-size:13px;letter-spacing:.04em;color:#8C8472;\">prompt<\u002Fspan>\n                    <span style=\"font-family:'Shippori Mincho B1',serif;font-size:12px;color:#A39A89;\">原稿<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"padding:16px;max-height:236px;overflow:auto;white-space:pre-wrap;font-size:13px;line-height:1.92;color:#3A372F;font-family:'Noto Sans JP',sans-serif;\">{{ p.body }}<\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- variables -->\n                <sc-if value=\"{{ p.hasVars }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"margin-top:16px;\">\n                  <div style=\"font-family:'Shippori Mincho B1',serif;font-size:13px;font-weight:700;color:#2E4A4E;margin-bottom:11px;\">変数を自分用に入力（任意）<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:10px;\">\n                    <sc-for list=\"{{ p.vars }}\" as=\"v\" hint-placeholder-count=\"2\">\n                      <div>\n                        <label style=\"display:block;font-size:12px;font-weight:600;color:#57534A;margin-bottom:4px;\">【{{ v.label }}】<\u002Flabel>\n                        <sc-if value=\"{{ v.isLong }}\" hint-placeholder-val=\"{{ false }}\">\n                          <textarea rows=\"3\" value=\"{{ v.value }}\" onchange=\"{{ v.onChange }}\" placeholder=\"{{ v.placeholder }}\" style=\"width:100%;background:#FFFDF8;border:1px solid #D8CFBD;border-radius:4px;padding:9px 11px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:#23211C;resize:vertical;line-height:1.6;\"><\u002Ftextarea>\n                        <\u002Fsc-if>\n                        <sc-if value=\"{{ v.isShort }}\" hint-placeholder-val=\"{{ true }}\">\n                          <input type=\"text\" value=\"{{ v.value }}\" onchange=\"{{ v.onChange }}\" placeholder=\"{{ v.placeholder }}\" style=\"width:100%;background:#FFFDF8;border:1px solid #D8CFBD;border-radius:4px;padding:9px 11px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:#23211C;\">\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- actions -->\n                <div style=\"display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;\">\n                  <button onclick=\"{{ p.onCopyFilled }}\" style=\"flex:1 1 150px;background:#2E4A4E;color:#F3EEE3;font-family:'Shippori Mincho B1',serif;font-weight:600;font-size:14px;padding:11px 14px;border:none;border-radius:4px;cursor:pointer;\">{{ p.filledLabel }}<\u002Fbutton>\n                  <button onclick=\"{{ p.onCopyRaw }}\" style=\"flex:1 1 110px;background:transparent;color:#2E4A4E;font-weight:600;font-size:13.5px;padding:11px 14px;border:1px solid #C3BAA6;border-radius:4px;cursor:pointer;\">{{ p.rawLabel }}<\u002Fbutton>\n                <\u002Fdiv>\n\n                <!-- privacy note -->\n                <div style=\"margin-top:14px;display:flex;align-items:flex-start;gap:8px;background:{{ p.noteBg }};border:1px solid {{ p.noteBorder }};border-radius:4px;padding:9px 12px;\">\n                  <span style=\"font-family:'Shippori Mincho B1',serif;font-size:12px;color:{{ p.noteColor }};font-weight:700;flex:none;\">{{ p.noteTag }}<\u002Fspan>\n                  <span style=\"font-size:12px;color:{{ p.noteColor }};line-height:1.55;font-weight:500;\">{{ p.riskNote }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer style=\"background:#23211C;padding:62px 32px 52px;\">\n  <div style=\"max-width:1180px;margin:0 auto;text-align:center;\">\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;\">\n      <span style=\"width:26px;height:26px;border:1.5px solid #B7C4BD;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:14px;color:#B7C4BD;\">智<\u002Fspan>\n      <span style=\"font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:18px;color:#F1ECE0;\">生成AI寺子屋<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"color:#9A9488;font-size:13.5px;line-height:1.9;max-width:580px;margin:0 auto;\">臨床検査技師のための生成AI活用ガイド。掲載のプロンプトは活用のたたき台です。利用にあたっては各施設の規程を確認し、患者・個人情報は入力しないでください。<\u002Fp>\n    <p style=\"color:#615C52;font-size:12px;margin:24px 0 0;font-family:'Spectral',serif;font-style:italic;letter-spacing:.06em;\">clinical lab × generative AI — terakoya<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showBasics&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { values:{}, copied:null };\n  }\n\n  fill(tpl, vals){\n    return tpl.replace(/【([^】]+)】/g, (m,n)=> (vals && vals[n] && String(vals[n]).trim()) ? vals[n] : m );\n  }\n\n  highlight(text){\n    const parts = String(text).split(/(【[^】]+】)/g);\n    return parts.map((seg,i)=>{\n      if(/^【[^】]+】$/.test(seg)){\n        return React.createElement('span',{key:i,style:{color:'#2E4A4E',fontWeight:700,background:'rgba(46,74,78,.09)',padding:'1px 5px',borderRadius:'3px',margin:'0 1px',borderBottom:'1px solid rgba(46,74,78,.35)'}}, seg);\n      }\n      return seg;\n    });\n  }\n\n  mkChange(pid,name){\n    return (e)=>{\n      const val = e.target.value;\n      this.setState(s=>{\n        const values = {...s.values};\n        values[pid] = {...(values[pid]||{}), [name]:val};\n        return {values};\n      });\n    };\n  }\n\n  copy(text,key){\n    try{ if(navigator.clipboard){ navigator.clipboard.writeText(text); } }catch(e){}\n    this.setState({copied:key});\n    clearTimeout(this._t);\n    this._t = setTimeout(()=> this.setState(s=> s.copied===key ? {copied:null} : {}), 1700);\n  }\n\n  data(){\n    const v=(n,ph,long)=>({n,ph,long:!!long});\n    const P=(id,title,desc,risk,tpl,vars)=>({id,title,desc,risk,tpl,vars});\n    return [\n      { id:'doc', anchor:'cat-doc', num:'01', label:'文書作成', tagline:'報告書・手順書(SOP)・申し送りを、たたき台から一気に。', prompts:[\n        P('doc1','検査報告書のコメント文','結果の傾向に応じた依頼医向けコメントを3案。','high',\n`あなたは経験豊富な臨床検査技師です。検査報告書に添えるコメント文の案を3つ作成してください。\n\n■検査項目：【検査項目】\n■結果の傾向：【結果の傾向】\n■基準値：【基準値】\n■患者背景（匿名）：【患者背景】\n\n条件：\n・依頼医が読む前提で、専門用語は正確に\n・1案2〜3文で簡潔に\n・確定診断を断定しない表現にする\n・次に確認すべき点を1つ添える`,\n          [v('検査項目','例：HbA1c'),v('結果の傾向','例：基準値を上回る'),v('基準値','例：4.6〜6.2%'),v('患者背景','例：60代・糖尿病疑い（匿名）')]),\n        P('doc2','標準作業手順書(SOP)の下書き','目的〜記録方法まで、現場で使える構成で。','std',\n`あなたは品質管理に詳しい臨床検査技師です。標準作業手順書（SOP）のドラフトを作成してください。\n\n■対象：【検査・機器名】\n■工程：【対象工程】\n■施設：【施設名】\n\n含める項目：目的／適用範囲／必要物品／手順（番号付き）／注意点／記録方法。\n現場で使える具体的な書き方にし、抜けがあれば最後に指摘してください。`,\n          [v('検査・機器名','例：自動血球計数装置'),v('対象工程','例：始業点検'),v('施設名','例：〇〇病院 検査科')]),\n        P('doc3','申し送りメモの整形・要約','走り書きメモを、伝わる申し送り文に。','high',\n`次の申し送りメモを、読みやすい申し送り文に整形・要約してください。\n\n■メモ：\n【申し送りメモ】\n\n条件：\n・時系列と要点が一目で分かるように\n・箇条書きと短い文を使う\n・申し送り漏れになりそうな点を最後に「確認事項」として挙げる\n※個人を特定できる情報は含めないでください`,\n          [v('申し送りメモ','匿名化したメモを貼り付け',true)]) ]},\n\n      { id:'research', anchor:'cat-research', num:'02', label:'学術・研究', tagline:'論文要約・英語抄録・統計の壁打ちを、研究の相棒に。', prompts:[\n        P('res1','論文の要約と批判的吟味','英語論文も日本語で要約＋強み/限界を整理。','std',\n`あなたは検査医学領域の研究者です。次の論文（要旨）を日本語で要約し、批判的に吟味してください。\n\n■論文タイトル／要旨：\n【論文情報】\n\n出力：\n1. 3行サマリー\n2. 目的・方法・主な結果\n3. 強みと限界（各2点）\n4. 自分の業務にどう活かせるか`,\n          [v('論文情報','タイトルや要旨（アブストラクト）を貼り付け',true)]),\n        P('res2','日本語要旨→英語抄録','学会投稿用の構造化英語抄録に変換。','std',\n`次の日本語要旨を、学会投稿用の英語抄録に翻訳・構造化してください。\n\n■日本語要旨：\n【日本語要旨】\n■投稿先／様式：【投稿先・様式】\n\n条件：\n・Background / Methods / Results / Conclusion の構成\n・学術的で簡潔な英語\n・専門用語は適切な英語表現に\n・最後に和訳も併記`,\n          [v('日本語要旨','要旨を貼り付け',true),v('投稿先・様式','例：〇〇学会・400語以内')]),\n        P('res3','統計手法の相談','デザインに合う手法を、初心者向けに壁打ち。','std',\n`あなたは生物統計に詳しいアドバイザーです。研究の統計手法について相談に乗ってください。\n\n■研究デザイン：【研究デザイン】\n■データの種類：【データの種類】\n■知りたいこと：【知りたいこと】\n\n出力：\n・推奨される統計手法と理由\n・前提条件と注意点\n・結果の解釈の仕方\n・初心者がつまずきやすい点`,\n          [v('研究デザイン','例：2群比較・前向き'),v('データの種類','例：連続変数・正規性不明'),v('知りたいこと','例：2群に差があるか')]) ]},\n\n      { id:'present', anchor:'cat-present', num:'03', label:'学会発表・スライド', tagline:'構成設計・抄録・想定質問まで、発表の準備を加速。', prompts:[\n        P('pre1','発表スライドの構成設計','1枚1メッセージで、時間配分つきの骨子。','std',\n`あなたはプレゼンが得意な臨床検査技師です。学会発表のスライド構成を設計してください。\n\n■演題：【演題】\n■発表時間：【発表時間】\n■聴衆：【聴衆】\n\n出力：\n・スライドごとの見出しと要点（1枚1メッセージ）\n・各スライドの目安時間\n・最も伝えたい1点を明確に`,\n          [v('演題','例：〇〇法の検討'),v('発表時間','例：7分'),v('聴衆','例：検査技師・臨床医')]),\n        P('pre2','構造化抄録のドラフト','目的〜結論から、学会様式の抄録を。','std',\n`次の内容から、構造化抄録のドラフトを作成してください。\n\n■目的：【目的】\n■方法：【方法】\n■結果：【結果】\n■結論：【結論】\n\n条件：\n・指定がなければ400字程度\n・客観的で簡潔な学術表現\n・結果は具体的に、結論は控えめに`,\n          [v('目的','例：〇〇の有用性を検討'),v('方法','例：〇〇例を対象に…'),v('結果','例：感度〇％…'),v('結論','例：有用と考えられた')]),\n        P('pre3','想定質問と回答準備','座長目線で10問。難易度順に対策。','std',\n`あなたは学会の座長経験者です。次の発表に対する想定質問と回答準備を手伝ってください。\n\n■発表概要：\n【発表概要】\n\n出力：\n・想定される質問を10個（易→難）\n・各質問への回答の方向性\n・特に準備しておくべき1問`,\n          [v('発表概要','発表の概要を貼り付け',true)]) ]},\n\n      { id:'qc', anchor:'cat-qc', num:'04', label:'精度管理・データ解釈', tagline:'管理図・ロット間差・乖離。考察の壁打ち相手に。', prompts:[\n        P('qc1','管理図の異常傾向の解釈','ルール違反の原因を、系統/偶然誤差で整理。','std',\n`あなたは精度管理に精通した臨床検査技師です。管理図の異常について一緒に考えてください。\n\n■項目：【項目】\n■管理図の状況：【管理図の状況】\n\n出力：\n・考えられる原因（系統誤差／偶然誤差の観点で）\n・確認すべきポイントの優先順位\n・とるべき対応の選択肢\n※あくまで考察の壁打ちで、最終判断は施設の手順に従う前提`,\n          [v('項目','例：血糖（QCレベル2）'),v('管理図の状況','例：2σを連続で超え上昇傾向')]),\n        P('qc2','試薬ロット間差・キャリブレーション','差の要因と切り分け手順を整理。','std',\n`試薬ロット間差・キャリブレーションについて考察を手伝ってください。\n\n■項目：【項目】\n■観察された差：【観察された差】\n\n出力：\n・考えられる要因\n・切り分けの手順\n・記録・報告時の留意点`,\n          [v('項目','例：CRP'),v('観察された差','例：新ロットで約8%高値')]),\n        P('qc3','測定法・項目間の乖離','生理/技術/干渉に分けて要因を列挙。','std',\n`2つの測定法／項目間の乖離について、考えられる要因を整理してください。\n\n■対象：【2つの測定法・項目】\n■乖離の状況：【乖離の状況】\n\n出力：\n・生理的要因／技術的要因／干渉物質などに分けて列挙\n・確認の進め方\n・依頼医に説明する際のポイント`,\n          [v('2つの測定法・項目','例：法Aと法BのNa値'),v('乖離の状況','例：法Bが常に低値')]) ]},\n\n      { id:'edu', anchor:'cat-edu', num:'05', label:'教育・新人指導', tagline:'勉強会資料・やさしい説明・理解度チェックを即作成。', prompts:[\n        P('edu1','勉強会スライドの骨子','学習目標と章立て、小演習つき。','std',\n`あなたは教育担当の臨床検査技師です。新人向け勉強会の骨子を作ってください。\n\n■テーマ：【テーマ】\n■対象の習熟度：【習熟度】\n■時間：【時間】\n\n出力：\n・学習目標（3つ）\n・章立てと各パートの要点\n・理解を促す問いかけや小演習`,\n          [v('テーマ','例：尿沈渣の見方'),v('習熟度','例：入職1年目'),v('時間','例：30分')]),\n        P('edu2','検査原理をやさしく説明','相手に合わせて、たとえ＋1行要約。','std',\n`次の検査の原理を、相手に合わせてやさしく説明してください。\n\n■検査項目／原理：【検査項目・原理】\n■説明する相手：【相手】\n\n条件：\n・専門用語は最小限、使う場合は言い換えを添える\n・身近なたとえを1つ入れる\n・最後に1行サマリー`,\n          [v('検査項目・原理','例：PT-INRの原理'),v('相手','例：新人技師')]),\n        P('edu3','理解度チェック問題','選択＋記述で、解説と頻出ミスつき。','std',\n`次の分野の理解度チェック問題を作成してください。\n\n■分野：【分野】\n■問題数：【問題数】\n■難易度：【難易度】\n\n出力：\n・問題（選択式と記述式を混在）\n・解答と簡潔な解説\n・特に間違えやすいポイント`,\n          [v('分野','例：輸血検査の基礎'),v('問題数','例：5問'),v('難易度','例：初級')]) ]},\n\n      { id:'comm', anchor:'cat-comm', num:'06', label:'院内コミュニケーション', tagline:'依頼メール・患者向け説明・お断り文を、角を立てず。', prompts:[\n        P('comm1','多職種への依頼メール','要点が先に伝わる、配慮ある文案。','std',\n`次の用件で、多職種への依頼メールの文案を作成してください。\n\n■宛先：【宛先】\n■用件：【用件】\n■希望：【希望】\n\n条件：\n・丁寧かつ簡潔、要点が先に伝わる構成\n・相手の負担に配慮した言い回し\n・件名も提案`,\n          [v('宛先','例：〇〇科の看護師長'),v('用件','例：採血手順の確認依頼'),v('希望','例：今週中に回答希望')]),\n        P('comm2','患者さん向けの検査説明文','中学生でも分かる、やわらかい言葉で。','high',\n`次の検査について、患者さん向けのやさしい説明文を作成してください。\n\n■検査名：【検査名】\n■注意事項：【注意事項】\n\n条件：\n・中学生でも分かる平易な言葉\n・不安をあおらない、やわらかいトーン\n・準備や注意点を箇条書きで\n※特定の患者情報は入力しないでください`,\n          [v('検査名','例：糖負荷試験'),v('注意事項','例：前日夜から絶食')]),\n        P('comm3','丁寧なお断り・調整文','配慮を示しつつ、要点は明確に。メール/口頭の2版。','std',\n`次の状況で、角を立てずに伝える丁寧な文章を作成してください。\n\n■状況：【状況】\n■伝えたいこと：【伝えたいこと】\n\n条件：\n・相手への配慮を示しつつ、要点は明確に\n・代替案や前向きな一言を添える\n・メール／口頭の2バージョン`,\n          [v('状況','例：急ぎの依頼が重なっている'),v('伝えたいこと','例：本日対応は難しい')]) ]},\n\n      { id:'excel', anchor:'cat-excel', num:'07', label:'業務効率化', tagline:'Excel関数・表整理・繰り返し作業の自動化を相談。', prompts:[\n        P('ex1','Excel関数の作成・説明','コピーして使える数式＋部分ごとの解説。','std',\n`あなたはExcelに詳しいアシスタントです。次の処理を実現する数式を教えてください。\n\n■やりたい処理：【やりたい処理】\n■データの形：【データの形】\n\n出力：\n・数式（コピーして使える形）\n・各部分が何をしているかの説明\n・別のやり方があれば1つ\n・つまずきやすい点`,\n          [v('やりたい処理','例：条件に合う件数を数える'),v('データの形','例：A列に日付、B列に項目')]),\n        P('ex2','表データの整理ルール','列構成・命名・入力ルールを提案。','std',\n`次のデータを扱いやすく整理するルールを提案してください。\n\n■データの内容：【データの内容】\n■目的：【目的】\n\n出力：\n・列構成と命名の案\n・入力ルール（表記ゆれ防止）\n・集計しやすくするコツ`,\n          [v('データの内容','例：日々の検査件数記録'),v('目的','例：月次で集計したい')]),\n        P('ex3','繰り返し作業の自動化相談','手順分解と、最初の一歩を提案。','std',\n`次の繰り返し作業を効率化したいです。手順の整理と自動化の方針を提案してください。\n\n■作業内容：【作業内容】\n\n出力：\n・作業を手順に分解\n・自動化できる部分とその方法（関数／マクロ等）\n・始めやすい最初の一歩`,\n          [v('作業内容','例：毎日同じ集計を転記している',true)]) ]},\n\n      { id:'study', anchor:'cat-study', num:'08', label:'学習・自己研鑽', tagline:'学習計画・深掘り解説・苦手克服を、自分専用の家庭教師に。', prompts:[\n        P('st1','学習計画の作成','目標から逆算した、週単位の計画。','std',\n`あなたは学習コーチです。次の目標に向けた学習計画を作ってください。\n\n■目標：【目標】\n■期間：【期間】\n■1日に確保できる時間：【確保時間】\n\n出力：\n・週単位のマイルストーン\n・1日の学習メニュー例\n・つまずいた時のリカバリー方法`,\n          [v('目標','例：認定資格に合格'),v('期間','例：3か月'),v('確保時間','例：平日1時間')]),\n        P('st2','テーマの深掘り解説','理解度に合わせて、なぜを段階的に。','std',\n`次のテーマを、私の理解度に合わせて深掘り解説してください。\n\n■テーマ：【テーマ】\n■現在の理解度：【理解度】\n\n条件：\n・基礎から段階的に\n・要所で「なぜそうなるか」を説明\n・理解確認の問いを最後に3つ`,\n          [v('テーマ','例：免疫電気泳動'),v('理解度','例：名前は知っている程度')]),\n        P('st3','苦手分野の克服ドリル','原因分析＋易しい順の練習問題。','std',\n`次の苦手分野を克服するためのドリルを作ってください。\n\n■苦手分野：【苦手分野】\n\n出力：\n・つまずきの原因として考えられる点\n・易しい順の練習問題（解説つき）\n・覚え方・コツ`,\n          [v('苦手分野','例：心電図の判読')]) ]},\n\n      { id:'career', anchor:'cat-career', num:'09', label:'メンタル・キャリア', tagline:'考えの整理、悩みの壁打ち、面談準備に。そっと寄り添う。', prompts:[\n        P('ca1','キャリアの壁打ち','価値観の言語化から、選択肢の整理まで。','std',\n`あなたは聞き上手なキャリアアドバイザーです。考えの整理を手伝ってください。\n\n■現状：【現状】\n■迷っていること：【迷っていること】\n\n進め方：\n・まず私の状況を要約して返す\n・大事にしている価値観を一緒に言語化\n・選択肢を複数挙げ、それぞれの良い点・気になる点を整理\n・結論は押し付けない`,\n          [v('現状','例：経験5年目・一般検査担当',true),v('迷っていること','例：認定取得か異動か')]),\n        P('ca2','仕事の悩み相談','受け止めて整理し、小さな一歩を1つ。','std',\n`仕事の悩みについて、考えを整理する相手になってください。\n\n■悩みの状況：【悩みの状況】\n\n進め方：\n・否定せずに受け止める\n・状況を客観的に整理して返す\n・捉え方の選択肢をいくつか提示\n・今日からできる小さな一歩を1つ`,\n          [v('悩みの状況','話したいことを自由に',true)]),\n        P('ca3','面談・面接の準備','要点整理と想定問答、話し方のコツ。','std',\n`次の場面に向けて、伝え方の準備を手伝ってください。\n\n■場面：【場面】\n■伝えたいこと：【伝えたいこと】\n\n出力：\n・伝えたい要点の整理\n・想定される質問と回答案\n・第一印象を良くする話し方のコツ`,\n          [v('場面','例：上司との面談'),v('伝えたいこと','例：来年度の希望')]) ]},\n    ];\n  }\n\n  renderVals(){\n    const raw = this.data();\n    const toc = raw.map(c=>({ num:c.num, label:c.label, href:'#'+c.anchor }));\n\n    const cats = raw.map(cat=>({\n      anchor:cat.anchor, num:cat.num, label:cat.label, tagline:cat.tagline,\n      prompts: cat.prompts.map(p=>{\n        const vals = this.state.values[p.id] || {};\n        const filled = this.fill(p.tpl, vals);\n        const high = p.risk==='high';\n        const copiedRaw = this.state.copied===p.id+':raw';\n        const copiedFilled = this.state.copied===p.id+':filled';\n        return {\n          title:p.title, desc:p.desc,\n          riskHigh: high,\n          hasVars: (p.vars && p.vars.length>0),\n          body: this.highlight(filled),\n          vars: (p.vars||[]).map(vr=>({\n            label:vr.n, placeholder:vr.ph, isLong:!!vr.long, isShort:!vr.long,\n            value: vals[vr.n] || '', onChange: this.mkChange(p.id, vr.n)\n          })),\n          filledLabel: copiedFilled ? 'コピーしました' : '入力を反映してコピー',\n          rawLabel: copiedRaw ? 'コピー済' : 'そのままコピー',\n          onCopyFilled: ()=>this.copy(filled, p.id+':filled'),\n          onCopyRaw: ()=>this.copy(p.tpl, p.id+':raw'),\n          riskNote: high ? '患者を特定できる情報（氏名・ID・生年月日等）は入力しないでください' : '匿名化・一般化した内容でご利用ください',\n          noteTag: high ? '注意' : '心得',\n          noteBg: high ? '#F6E9E1' : '#EFEEDF',\n          noteBorder: high ? '#DEBBA9' : '#DDD7C2',\n          noteColor: high ? '#A6492E' : '#5A6B52',\n        };\n      })\n    }));\n\n    return {\n      showBasics: (this.props && this.props.showBasics!==undefined) ? this.props.showBasics : true,\n      toc,\n      categories: cats,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
